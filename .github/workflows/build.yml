name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Fetch dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze || true
        continue-on-error: true

      # Decode the release keystore from the secret into a temp file.
      # The build.gradle reads REPLYGENIUS_KEYSTORE_PATH env var to find it.
      - name: Decode release keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p $HOME/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/keystore/replygenius.jks
          echo "REPLYGENIUS_KEYSTORE_PATH=$HOME/keystore/replygenius.jks" >> $GITHUB_ENV
          echo "REPLYGENIUS_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "REPLYGENIUS_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "REPLYGENIUS_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          ls -la $HOME/keystore/

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release

      - name: List built APKs
        run: |
          ls -lh build/app/outputs/flutter-apk/ || true

      - name: Verify release APK signature
        run: |
          echo "=== Release APK signature info ==="
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --print-certs \
            build/app/outputs/flutter-apk/app-release.apk || true

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: replygenius-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: replygenius-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
          retention-days: 30
