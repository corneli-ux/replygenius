// android/app/build.gradle
plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "1"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "1.0"

// ─── Release signing config ───────────────────────────────────────────────
// Reads from one of two sources:
//   1. environment variables REPLYGENIUS_KEYSTORE_PATH / REPLYGENIUS_KEYSTORE_PASSWORD
//      / REPLYGENIUS_KEY_ALIAS / REPLYGENIUS_KEY_PASSWORD  (used by GitHub Actions)
//   2. android/key.properties file with keys storeFile / storePassword / keyAlias
//      / keyPassword  (used by local builds)
//
// If neither is present, falls back to the debug signing config (CI dev builds).
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

def envKeystorePath = System.getenv("REPLYGENIUS_KEYSTORE_PATH")
def envKeystorePassword = System.getenv("REPLYGENIUS_KEYSTORE_PASSWORD")
def envKeyAlias = System.getenv("REPLYGENIUS_KEY_ALIAS")
def envKeyPassword = System.getenv("REPLYGENIUS_KEY_PASSWORD")

def releaseKeystorePath = envKeystorePath ?: keystoreProperties.getProperty("storeFile")
def releaseKeystorePassword = envKeystorePassword ?: keystoreProperties.getProperty("storePassword")
def releaseKeyAlias = envKeyAlias ?: keystoreProperties.getProperty("keyAlias")
def releaseKeyPassword = envKeyPassword ?: keystoreProperties.getProperty("keyPassword")

def hasReleaseSigning = releaseKeystorePath != null && new File(releaseKeystorePath).exists()

android {
    namespace = "com.replygenius.app"
    compileSdk = 35
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        // Required by flutter_local_notifications (and other AndroidX libs)
        coreLibraryDesugaringEnabled = true
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId = "com.replygenius.app"
        minSdk = 23          // NotificationListenerService extras need API 23+
        targetSdk = 35
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile file(releaseKeystorePath)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            // Use the real release signing config if available; otherwise
            // fall back to debug signing so dev builds still work.
            signingConfig = hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
    implementation "androidx.core:core-ktx:1.13.1"
    implementation "androidx.localbroadcastmanager:localbroadcastmanager:1.1.0"
    implementation "com.google.code.gson:gson:2.10.1"
    implementation "org.json:json:20240303"
    // Required for core library desugaring (flutter_local_notifications)
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.2"
}
