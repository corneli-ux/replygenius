name: replygenius
description: AI-powered customer reply assistant that crafts calm, empathetic, skillful replies for angry customers across WhatsApp and SMS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local persistence
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # HTTP for Gemini API
  http: ^1.2.1

  # Local database for reply history
  sqflite: ^2.3.3
  path: ^1.9.0

  # UI utilities
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  uuid: ^4.4.0

  # Permissions
  permission_handler: ^11.3.1

  # Notifications (escalation alerts)
  flutter_local_notifications: ^17.1.2

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
